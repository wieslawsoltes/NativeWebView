<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NativeWebView Auth Start</title>
</head>
<body>
<p>Starting authentication redirect...</p>
<script>
  (() => {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get("redirect");

    if (!redirect) {
      document.body.textContent = "Missing redirect target.";
      return;
    }

    window.setTimeout(() => {
      window.location.replace(redirect);
    }, 200);
  })();
</script>
</body>
</html>
